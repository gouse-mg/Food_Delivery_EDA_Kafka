<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Dashboard</title>
    <link rel="stylesheet" href="frontend.css">
</head>
<body>

<h2 id="restaurantName">Connecting...</h2>

<!-- ── DISHES ──────────────────────────────────── -->
<div id="dishes-section">
    <h3>My Dishes</h3>
    <div id="dish-list"></div>
    <p id="dishes-empty">Loading dishes...</p>

    <form id="add-dish-form">
        <input id="dish-name"        type="text"   placeholder="Dish name"    required>
        <input id="dish-price"       type="number" placeholder="Price"        required min="0" step="0.01">
        <input id="dish-description" type="text"   placeholder="Description (optional)">
        <button type="submit">+ Add Dish</button>
        <span id="dish-msg"></span>
    </form>
</div>

<!-- ── ORDERS ──────────────────────────────────── -->
<div id="orders-section">
    <h3>Incoming Orders</h3>
    <ul id="messages"></ul>

    <h3>Confirmed Orders</h3>
    <pre id="confirmedOrders">{}</pre>
</div>

<script src="frontend.js"></script>
</body>
</html>
