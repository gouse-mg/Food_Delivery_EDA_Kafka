<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Place Order</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --border: #2a2a2a;
    --accent: #f0c040;
    --accent-dim: #f0c04022;
    --text: #f0ede8;
    --muted: #666;
    --success: #4caf7d;
    --error: #e05c5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    width: 100%;
    max-width: 480px;
    padding: 2.5rem;
    position: relative;
    animation: slideUp 0.4s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 40px; height: 40px;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
    border-radius: 2px 0 0 0;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .label-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 2rem;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 0.75rem;
    align-items: end;
    margin-bottom: 0.75rem;
  }

  .field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    padding: 0.6rem 0.75rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  input[type="number"].error { border-color: var(--error); }

  .btn-remove {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    font-size: 1rem;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .btn-remove:hover { color: var(--error); border-color: var(--error); }

  .btn-add {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 2px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.6rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-top: 0.25rem;
  }
  .btn-add:hover { color: var(--accent); border-color: var(--accent); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  .btn-place {
    width: 100%;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: 2px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.85rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-place:hover:not(:disabled) { opacity: 0.88; }
  .btn-place:active:not(:disabled) { transform: scale(0.985); }
  .btn-place:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Log */
  #log { margin-top: 1.5rem; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; display: none; }
  #log.visible { display: block; }
  .log-header { background: var(--bg); padding: 0.5rem 0.75rem; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  #log-list { list-style: none; max-height: 160px; overflow-y: auto; padding: 0.5rem 0; }
  #log-list::-webkit-scrollbar { width: 4px; }
  #log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #log-list li { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); padding: 0.25rem 0.75rem; display: flex; gap: 0.6rem; }
  #log-list li .ts { color: var(--accent); flex-shrink: 0; }
  #log-list li.sent { color: var(--success); }
  #log-list li.failed { color: var(--error); }

  /* Toast */
  #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 0.75rem 1.25rem; font-family: 'DM Mono', monospace; font-size: 0.8rem; display: flex; align-items: center; gap: 0.6rem; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  #toast.success .dot { background: var(--success); }
  #toast.error   .dot { background: var(--error); }
</style>
</head>
<body>

<div class="card">
  <div class="label-tag">— Order System</div>
  <h1>Place<br>an Order</h1>

  <div id="cart-rows"></div>
  <button class="btn-add" onclick="addRow()">+ Add Item</button>

  <hr class="divider">
  <button class="btn-place" id="placeBtn" onclick="placeOrder()">Place Order</button>

  <div id="log">
    <div class="log-header">Order Results</div>
    <ul id="log-list"></ul>
  </div>
</div>

<div id="toast"><span class="dot"></span><span id="toast-msg"></span></div>

<script>
  let rowCount = 0;

  function addRow(dishVal = '', resVal = '') {
    rowCount++;
    const id = rowCount;
    const container = document.getElementById('cart-rows');
    const div = document.createElement('div');
    div.className = 'row';
    div.id = `row-${id}`;
    div.innerHTML = `
      <div class="field">
        ${id === 1 ? '<label>Dish ID</label>' : ''}
        <input type="number" id="dish-${id}" placeholder="Dish ID" min="1" value="${dishVal}">
      </div>
      <div class="field">
        ${id === 1 ? '<label>Restaurant ID</label>' : ''}
        <input type="number" id="res-${id}" placeholder="Res ID" min="1" value="${resVal}">
      </div>
      <button class="btn-remove" onclick="removeRow(${id})" title="Remove">✕</button>
    `;
    container.appendChild(div);
  }

  function removeRow(id) {
    const rows = document.querySelectorAll('#cart-rows .row');
    if (rows.length === 1) return; // keep at least one row
    document.getElementById(`row-${id}`)?.remove();
  }

  function buildCart() {
    const rows = document.querySelectorAll('#cart-rows .row');
    const cart = [];
    let valid = true;

    rows.forEach(row => {
      const rid = row.id.split('-')[1];
      const dishInput = document.getElementById(`dish-${rid}`);
      const resInput  = document.getElementById(`res-${rid}`);
      const dish = parseInt(dishInput.value);
      const res  = parseInt(resInput.value);

      dishInput.classList.remove('error');
      resInput.classList.remove('error');

      if (!dishInput.value || dish < 1) { dishInput.classList.add('error'); valid = false; }
      if (!resInput.value  || res  < 1) { resInput.classList.add('error');  valid = false; }

      if (valid) cart.push([dish, res]);
    });

    return valid ? cart : null;
  }

  function addLog(msg, type = '') {
    const log = document.getElementById('log');
    const list = document.getElementById('log-list');
    log.classList.add('visible');
    const li = document.createElement('li');
    if (type) li.classList.add(type);
    const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
    li.innerHTML = `<span class="ts">${ts}</span><span>${msg}</span>`;
    list.appendChild(li);
    list.scrollTop = list.scrollHeight;
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.className = `show ${type}`;
    document.getElementById('toast-msg').textContent = msg;
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.className = '', 3000);
  }

  async function placeOrder() {
    const cart = buildCart();
    if (!cart) { showToast('Fix the highlighted fields.', 'error'); return; }

    const btn = document.getElementById('placeBtn');
    btn.disabled = true;
    btn.textContent = 'Placing…';

    addLog(`Sending cart: ${JSON.stringify(cart)}`);

    try {
      const resp = await fetch('/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart })
      });

      const data = await resp.json();

      if (resp.ok) {
    addLog(`✓ Order #${data.oid}: ${data.msg}`, 'sent');
    showToast(`Order #${data.oid} — ${data.msg}`, 'success');
    } 
    else {
    addLog(`Error: ${data.detail || resp.statusText}`, 'failed');
    showToast(data.detail || 'Request failed.', 'error');
    }
    } catch (err) {
      addLog(`Network error: ${err.message}`, 'failed');
      showToast('Could not reach server.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Place Order';
    }
  }

  // Start with one row
  addRow();
</script>
</body>
</html>
